name: Deploy Laravel to cPanel (FTP)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, json, pdo, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/**
            **/.cursor/**
            **/.codex/**
            **/.phpunit.cache/**
            **/.phpunit.result.cache/**
            **/.claude/**

      - name: Run post-deploy commands on server
        run: |
          curl -fsS "${{ secrets.APP_URL }}/deploy/run?token=${{ secrets.DEPLOY_SECRET }}"
